# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    rateLimiter.allowance: '%env(RATE_LIMITER_ALLOWANCE_REQUESTS)%'
    rateLimiter.durationSeconds: '%env(RATE_LIMITER_TIME_DURATION_SECONDS)%'
    app.blockingParanoia: '%env(BLOCKING_PARANOIA)%'
services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Layer/Domain/Entity/'
            - '../src/Kernel.php'
            - '../src/Exception/ExceptionNormalizer.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\EventListener\LocaleListener:
        arguments:
            $defaultLocale: '%kernel.default_locale%'
        tags:
            - { name: kernel.event_listener, event: kernel.request, priority: 20 }

    App\EventListener\LangListener:
        arguments:
            $symfonyTranslator: '@translator'
        tags:
            - { name: kernel.event_listener, event: kernel.request, priority: 19 }

    App\EventListener\ValidationExceptionListener:
        arguments:
            $isDebug: '%kernel.debug%'
        tags:
            - { name: kernel.event_listener, event: kernel.exception, priority: 18 }

    App\EventListener\BlockIPListener:
        tags:
            - { name: kernel.event_listener, event: kernel.request, priority: 17 }

    App\EventListener\RateLimiterListener:
        tags:
            - { name: kernel.event_listener, event: kernel.request, priority: 16 }

    App\EventListener\RateLimiterResponseListener:
        tags:
            - { name: kernel.event_listener, event: kernel.response, priority: 15 }

nelmio_cors:
    defaults:
        #origin_regex: true
        #allow_origin: ['%env(CORS_ALLOW_ORIGIN)%']
        allow_origin: [ '*' ]
        allow_methods: [ 'OPTIONS', 'GET', 'POST', 'PUT', 'PATCH', 'DELETE' ]
        #allow_headers: ['Content-Type', 'Authorization', 'Locale']
        allow_headers: [ '*' ]
        expose_headers: [ 'Link' ]
        max_age: 3600
        paths:
            '^/': null
